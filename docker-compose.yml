# CHRONOS Docker — 全栈部署
# docker compose up -d
#
# 拓扑: caddy (80/443) → chronos (内部 3006)。应用同时发布 127.0.0.1:3006
# 供宿主机直连/健康检查。Caddy 配置使用 Caddyfile.docker；
# 宿主机直装 Caddy 的拓扑请用根目录 Caddyfile。

services:
  # ──── CHRONOS 应用 (SQLite 默认) ────
  chronos:
    build: .
    container_name: chronos-app
    ports:
      - "127.0.0.1:3006:3006"
    environment:
      - NODE_ENV=production
      - PORT=3006
      - JWT_SECRET=${JWT_SECRET:?err}
      - DATABASE_URL=file:/app/data/chronos.db
    volumes:
      - chronos_data:/app/data       # SQLite 数据持久化
      - chronos_uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3006/api/health',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
    # 日志轮转: 防止 json-file 日志撑爆磁盘
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # 资源限额（非 swarm 模式生效）
    mem_limit: 1g
    cpus: 1.0

  # ──── Caddy 反向代理 (Docker 一体化拓扑, 配置见 Caddyfile.docker) ────
  caddy:
    image: caddy:2-alpine
    container_name: chronos-caddy
    depends_on:
      - chronos
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.docker:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ──── PostgreSQL (可选, DB_TYPE=postgres 时启用) ────
  postgres:
    image: postgres:16-alpine
    container_name: chronos-pg
    profiles: ["pg"]  # 默认不启动, 用 --profile pg 启用
    environment:
      POSTGRES_USER: chronos
      POSTGRES_PASSWORD: ${DB_PASSWORD:?err}
      POSTGRES_DB: chronos
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chronos"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ──── Redis (预留, 默认不启动) ────
  # 注意: 服务端当前未接入 Redis（代码无 redis 依赖），此 profile 为预留定义，
  # 待服务端接入缓存/队列后再用 --profile redis 启用。
  redis:
    image: redis:7-alpine
    container_name: chronos-redis
    profiles: ["redis"]  # 默认不启动, 用 --profile redis 启用
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:?err}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  chronos_data:
  chronos_uploads:
  pg_data:
  redis_data:
  caddy_data:
  caddy_config:
